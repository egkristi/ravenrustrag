replicaCount: 1

image:
  repository: ghcr.io/egkristi/ravenrustrag
  pullPolicy: IfNotPresent
  tag: ""  # defaults to appVersion

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: raven.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

persistence:
  enabled: true
  storageClass: ""
  size: 1Gi
  accessMode: ReadWriteOnce

config:
  readOnly: false
  apiKey: ""
  embedBackend: "ollama"
  embedUrl: "http://ollama:11434"
  embedModel: "nomic-embed-text"
  logFormat: "json"
  corsOrigins: "*"
  rateLimit: 100
  requestTimeout: 30

nodeSelector: {}
tolerations: []
affinity: {}
