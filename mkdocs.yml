site_name: RavenRustRAG
site_url: https://egkristi.github.io/ravenrustrag/
site_description: Fearlessly fast local-first RAG engine written in Rust
site_author: egkristi
repo_url: https://github.com/egkristi/ravenrustrag
repo_name: egkristi/ravenrustrag
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: quickstart.md
      - Configuration: configuration.md
  - User Guide:
      - CLI Reference: cli.md
      - File Formats: file-formats.md
      - Hybrid Search: hybrid-search.md
      - Knowledge Graph: knowledge-graph.md
      - Performance Tuning: performance.md
  - Server & Integration:
      - HTTP API: api.md
      - MCP Server: mcp.md
      - Docker: docker.md
  - Development:
      - Architecture: architecture.md
      - Contributing: contributing.md
      - Testing: testing.md
  - Reference:
      - Troubleshooting: troubleshooting.md
      - Migration from Python: migration.md
      - Changelog: changelog.md
