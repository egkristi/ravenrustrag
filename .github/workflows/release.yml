name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: raven-linux-amd64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: raven-linux-amd64-musl
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: raven-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: raven-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: raven-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: raven-windows-amd64.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: raven-windows-arm64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Ensure target is installed
        run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: Install cross (for cross-compilation targets)
        if: matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --locked
      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ] || [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp target/${{ matrix.target }}/release/ravenrag.exe dist/${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/ravenrag dist/${{ matrix.artifact }}
            chmod +x dist/${{ matrix.artifact }}
          fi
      - name: Create portable ZIP
        shell: bash
        run: |
          ZIPNAME="${{ matrix.artifact }}"
          ZIPNAME="${ZIPNAME%.exe}"  # strip .exe suffix if present
          mkdir -p zip-staging
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp target/${{ matrix.target }}/release/ravenrag.exe zip-staging/
          else
            cp target/${{ matrix.target }}/release/ravenrag zip-staging/
            chmod +x zip-staging/ravenrag
          fi
          cp README.md LICENSE zip-staging/ 2>/dev/null || true
          cd zip-staging
          if command -v zip >/dev/null 2>&1; then
            zip -r ../dist/${ZIPNAME}.zip .
          else
            # Windows: use PowerShell
            powershell -Command "Compress-Archive -Path '*' -DestinationPath '../dist/${ZIPNAME}.zip'"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/*.zip

  release:
    name: Create Release
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"* release/
          done
          cd release && sha256sum * > SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  winget:
    name: Publish to winget
    needs: release
    if: ${{ !cancelled() && needs.release.result == 'success' }}
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: egkristi.ravenrag
          installers-regex: raven-windows-amd64\.exe$
          token: ${{ secrets.WINGET_TOKEN }}

  homebrew:
    name: Update Homebrew tap
    needs: release
    if: ${{ !cancelled() && needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Download SHA256SUMS
        run: |
          curl -sL "https://github.com/egkristi/ravenrustrag/releases/download/${GITHUB_REF_NAME}/SHA256SUMS" -o SHA256SUMS
      - name: Generate formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_DARWIN_ARM64=$(grep 'raven-darwin-arm64$' SHA256SUMS | awk '{print $1}')
          SHA_DARWIN_AMD64=$(grep 'raven-darwin-amd64$' SHA256SUMS | awk '{print $1}')
          SHA_LINUX_ARM64=$(grep 'raven-linux-arm64$' SHA256SUMS | awk '{print $1}')
          SHA_LINUX_AMD64=$(grep 'raven-linux-amd64$' SHA256SUMS | awk '{print $1}')

          sed -e "s/\${VERSION}/${VERSION}/g" \
              -e "s/\${SHA256_DARWIN_ARM64}/${SHA_DARWIN_ARM64}/g" \
              -e "s/\${SHA256_DARWIN_AMD64}/${SHA_DARWIN_AMD64}/g" \
              -e "s/\${SHA256_LINUX_ARM64}/${SHA_LINUX_ARM64}/g" \
              -e "s/\${SHA256_LINUX_AMD64}/${SHA_LINUX_AMD64}/g" \
              packaging/homebrew/raven.rb.template > ravenrag.rb
      - name: Push to homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/egkristi/homebrew-tap.git tap
          cp ravenrag.rb tap/Formula/ravenrag.rb
          rm -f tap/Formula/raven.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update ravenrag to ${{ steps.version.outputs.version }}"
          git push
