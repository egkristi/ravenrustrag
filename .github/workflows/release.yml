name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: raven-linux-amd64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: raven-linux-amd64-musl
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: raven-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: raven-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: raven-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: raven-windows-amd64.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: raven-windows-arm64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: Install cross (for musl/arm64)
        if: matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --locked
      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ] || [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp target/${{ matrix.target }}/release/raven.exe dist/${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/raven dist/${{ matrix.artifact }}
            chmod +x dist/${{ matrix.artifact }}
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"* release/
          done
          cd release && sha256sum * > SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
