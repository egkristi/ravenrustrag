name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "book.toml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mkdocs
        run: pip install mkdocs-material mkdocs-minify-plugin

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build mkdocs site
        run: mkdocs build --strict

      - name: Deploy to gh-pages (preserving existing content)
        run: |
          # Checkout gh-pages branch into a temp dir
          git worktree add /tmp/gh-pages gh-pages

          # Remove old docs files but preserve dev/ (benchmarks)
          cd /tmp/gh-pages
          find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name 'dev' -exec rm -rf {} +

          # Copy new site files
          cp -r $GITHUB_WORKSPACE/site/* /tmp/gh-pages/

          # Commit and push
          cd /tmp/gh-pages
          git add -A
          git diff --cached --quiet || git commit -m "docs: update site from ${GITHUB_SHA::8}"
          git push origin gh-pages
