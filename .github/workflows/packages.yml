name: Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  linux-packages:
    name: Linux Packages (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            artifact: raven-linux-amd64
            nfpm_arch: amd64
          - arch: arm64
            artifact: raven-linux-arm64
            nfpm_arch: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ steps.tag.outputs.name }} \
            --pattern "${{ matrix.artifact }}" \
            --dir ./packaging/nfpm/
          mv ./packaging/nfpm/${{ matrix.artifact }} ./packaging/nfpm/raven
          chmod +x ./packaging/nfpm/raven

      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm

      - name: Set version
        id: version
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build .deb package
        working-directory: packaging/nfpm
        run: |
          VERSION=${{ steps.version.outputs.version }} \
          ARCH=${{ matrix.nfpm_arch }} \
          envsubst < nfpm.yaml > nfpm-resolved.yaml
          nfpm package -f nfpm-resolved.yaml -p deb -t ../../raven-rag_${{ steps.version.outputs.version }}_${{ matrix.nfpm_arch }}.deb

      - name: Build .rpm package
        working-directory: packaging/nfpm
        run: |
          VERSION=${{ steps.version.outputs.version }} \
          ARCH=${{ matrix.nfpm_arch }} \
          envsubst < nfpm.yaml > nfpm-resolved.yaml
          nfpm package -f nfpm-resolved.yaml -p rpm -t ../../raven-rag-${{ steps.version.outputs.version }}.${{ matrix.nfpm_arch }}.rpm

      - name: Build .apk package
        working-directory: packaging/nfpm
        run: |
          VERSION=${{ steps.version.outputs.version }} \
          ARCH=${{ matrix.nfpm_arch }} \
          envsubst < nfpm.yaml > nfpm-resolved.yaml
          nfpm package -f nfpm-resolved.yaml -p apk -t ../../raven-rag_${{ steps.version.outputs.version }}_${{ matrix.nfpm_arch }}.apk

      - name: Upload packages to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ steps.tag.outputs.name }} \
            raven-rag_${{ steps.version.outputs.version }}_${{ matrix.nfpm_arch }}.deb \
            raven-rag-${{ steps.version.outputs.version }}.${{ matrix.nfpm_arch }}.rpm \
            raven-rag_${{ steps.version.outputs.version }}_${{ matrix.nfpm_arch }}.apk \
            --clobber

  cargo-deb:
    name: cargo-deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked
      - name: Build .deb
        run: cargo deb -p raven-cli
      - name: Upload .deb to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ steps.tag.outputs.name }} \
            target/debian/*.deb \
            --clobber
