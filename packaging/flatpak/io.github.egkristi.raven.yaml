app-id: io.github.egkristi.raven
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: ravenrag

finish-args:
  - --share=network
  - --filesystem=home

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin

modules:
  - name: raven
    buildsystem: simple
    build-commands:
      - cargo build --release --locked
      - install -Dm755 target/release/ravenrag /app/bin/ravenrag
    sources:
      - type: archive
        url: https://github.com/egkristi/ravenrustrag/archive/v${VERSION}.tar.gz
        sha256: ${SHA256_SOURCE}
