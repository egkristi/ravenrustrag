ReleaseNotes: |
  Initial release of RavenRustRAG v1.0.0 with:
  - Vector similarity search with SQLite/ChromaDB storage
  - Document splitting and multiple file loaders (PDF, DOCX, TXT, CSV, etc.)
  - Ollama and OpenAI embedding backends
  - REST API server with streaming and OpenAPI docs
  - MCP server for AI assistant integration
  - CLI with indexing, querying, and server modes
  - Docker images for all platforms
  - Multi-platform binaries (Windows, macOS, Linux)
